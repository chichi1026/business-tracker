<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>業務記錄 · 蕙琦</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --ink: #1a1a2e;
  --ink2: #5a5a7a;
  --accent: #c84b31;
  --accent2: #e8703a;
  --lib: #2d6a9f;
  --irb: #7b3fa0;
  --dental: #c84b31;
  --other: #2e7d5e;
  --mgmt: #b5620a;
  --event: #c47a00;
  --border: #e0ddd6;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --r: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
}

/* ── Header ── */
.hdr {
  background: var(--ink);
  color: white;
  padding: 14px 18px 12px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
}
.hdr-title { font-size: 16px; font-weight: 900; letter-spacing: 1px; }
.hdr-sub { font-size: 11px; opacity: 0.55; margin-top: 1px; }
.hdr-month {
  background: var(--accent); color: white;
  border: none; border-radius: 8px;
  padding: 6px 14px; font-size: 13px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}

/* ── Tabs ── */
.tabs {
  display: flex; background: var(--card);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 57px; z-index: 99;
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: none; padding: 10px 18px;
  font-size: 13px; font-weight: 700; color: var(--ink2);
  cursor: pointer; border-bottom: 3px solid transparent;
  white-space: nowrap; transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Content ── */
.page { display: none; padding: 14px; }
.page.active { display: block; }

/* ── Stats ── */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 14px;
}
.stat-card {
  background: var(--card); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
  box-shadow: var(--shadow);
}
.stat-card .val { font-size: 24px; font-weight: 900; color: var(--accent); }
.stat-card .lbl { font-size: 11px; color: var(--ink2); margin-top: 2px; }

.section-stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.sec-pill {
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; gap: 5px;
}
.sec-pill .hrs { font-size: 13px; }

/* ── Quick Record ── */
.month-row {
  display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
}
.month-input {
  flex: 1; border: 2px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 14px; font-family: inherit;
  background: var(--card);
}
.month-input:focus { outline: none; border-color: var(--accent); }
.btn-set {
  background: var(--ink); color: white; border: none;
  border-radius: 8px; padding: 9px 16px;
  font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer;
}

/* ── Section groups ── */
.sec-group { margin-bottom: 16px; }
.sec-hdr {
  font-size: 11px; font-weight: 900; letter-spacing: 1px;
  text-transform: uppercase; color: var(--ink2);
  padding: 6px 0 6px 2px;
  display: flex; align-items: center; gap: 6px;
}
.sec-hdr::before {
  content: ''; display: block; width: 3px; height: 14px;
  border-radius: 2px;
}
.sec-lib .sec-hdr::before { background: var(--lib); }
.sec-irb .sec-hdr::before { background: var(--irb); }
.sec-dental .sec-hdr::before { background: var(--dental); }
.sec-other .sec-hdr::before { background: var(--other); }
.sec-mgmt .sec-hdr::before { background: var(--mgmt); }
.sec-event .sec-hdr::before { background: var(--event); }

.task-grid { display: flex; flex-direction: column; gap: 6px; }
.task-btn {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s; text-align: left;
}
.task-btn:active { transform: scale(0.98); }
.task-btn.active { border-color: var(--accent); background: #fff5f3; }
.task-name { font-size: 13px; font-weight: 600; color: var(--ink); flex: 1; }
.task-freq { font-size: 11px; color: var(--ink2); margin-left: 8px; white-space: nowrap; }

/* ── Input form ── */
.input-card {
  background: #fff8f6;
  border: 2px solid var(--accent);
  border-radius: var(--r); padding: 14px;
  margin-bottom: 14px;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
.input-task-name { font-size: 14px; font-weight: 900; color: var(--accent); margin-bottom: 12px; }
.input-row { display: flex; flex-direction: column; gap: 8px; }
.input-row .field { display: flex; flex-direction: column; gap: 4px; }
.input-row label { font-size: 11px; font-weight: 700; color: var(--ink2); }
.input-row input, .input-row textarea {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 14px; font-family: inherit;
  background: white;
}
.input-row input:focus, .input-row textarea:focus {
  outline: none; border-color: var(--accent);
}
.input-row textarea { resize: none; height: 64px; }
.inline-row { display: flex; gap: 8px; }
.inline-row .field { flex: 1; }
.btn-add {
  width: 100%; background: var(--accent); color: white;
  border: none; border-radius: 10px; padding: 12px;
  font-size: 15px; font-weight: 900; font-family: inherit;
  cursor: pointer; margin-top: 4px; letter-spacing: 0.5px;
  transition: background 0.15s;
}
.btn-add:active { background: #a83020; }
.btn-cancel {
  width: 100%; background: none; color: var(--ink2);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px; font-size: 13px; font-family: inherit;
  cursor: pointer; margin-top: 6px;
}

/* ── Record list ── */
.rec-section { margin-bottom: 16px; }
.rec-sec-hdr {
  font-size: 12px; font-weight: 900; color: white;
  padding: 6px 12px; border-radius: 8px 8px 0 0;
  display: flex; justify-content: space-between; align-items: center;
}
.rec-sec-hdr .sub-total {
  font-size: 12px; background: rgba(255,255,255,0.2);
  padding: 2px 10px; border-radius: 10px;
}
.rec-bg-lib { background: var(--lib); }
.rec-bg-irb { background: var(--irb); }
.rec-bg-dental { background: var(--dental); }
.rec-bg-other { background: var(--other); }
.rec-bg-mgmt { background: var(--mgmt); }
.rec-bg-event { background: var(--event); }

.rec-list { background: var(--card); border-radius: 0 0 8px 8px; overflow: hidden; }
.rec-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.rec-item:last-child { border-bottom: none; }
.rec-info { flex: 1; min-width: 0; }
.rec-task { font-size: 13px; font-weight: 700; color: var(--ink); }
.rec-desc { font-size: 12px; color: var(--ink2); margin-top: 2px; word-break: break-all; }
.rec-date { font-size: 11px; color: #aaa; margin-top: 2px; }
.rec-hrs {
  background: var(--ink); color: white;
  border-radius: 20px; padding: 3px 10px;
  font-size: 12px; font-weight: 900; white-space: nowrap;
  align-self: flex-start;
}
.rec-del {
  background: none; border: none; cursor: pointer;
  color: #ccc; font-size: 18px; padding: 0 0 0 4px;
  align-self: flex-start;
}
.rec-del:active { color: var(--accent); }

/* ── Empty state ── */
.empty { text-align: center; padding: 48px 20px; color: #bbb; }
.empty .ico { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 13px; }

/* ── Export ── */
.export-card {
  background: var(--card); border-radius: var(--r);
  padding: 16px; margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.export-card h3 { font-size: 14px; font-weight: 900; margin-bottom: 10px; }
.btn-export {
  display: block; width: 100%;
  padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; margin-bottom: 8px; text-align: center;
  transition: opacity 0.15s;
}
.btn-export:active { opacity: 0.8; }
.btn-excel { background: #1d6f42; color: white; }
.btn-csv { background: var(--ink); color: white; }

/* ── Loading / Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: white;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
  transition: transform 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.loading-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center;
  z-index: 998; display: none;
}
.loading-box {
  background: white; border-radius: var(--r);
  padding: 24px 32px; text-align: center;
  font-size: 14px; font-weight: 700;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loadingMsg">讀取中…</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="hdr">
  <div>
    <div class="hdr-title">📋 業務記錄</div>
    <div class="hdr-sub">蕙琦 · 雲端同步版</div>
  </div>
  <button class="hdr-month" onclick="showTab('setting')">
    <span id="hdrMonth">⚙ 設定月份</span>
  </button>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="showTab('record')" data-tab="record">＋ 記錄</div>
  <div class="tab" onclick="showTab('list')" data-tab="list">📋 本月記錄</div>
  <div class="tab" onclick="showTab('export')" data-tab="export">📊 匯出</div>
  <div class="tab" onclick="showTab('setting')" data-tab="setting">⚙ 設定</div>
</div>

<!-- Page: Record -->
<div class="page active" id="page-record">
  <div id="inputForm" style="display:none"></div>
  <div id="taskList"></div>
</div>

<!-- Page: List -->
<div class="page" id="page-list">
  <div id="statsArea"></div>
  <div id="recordList"></div>
</div>

<!-- Page: Export -->
<div class="page" id="page-export">
  <div class="export-card">
    <h3>📊 產出月報</h3>
    <p style="font-size:12px;color:var(--ink2);margin-bottom:12px">將本月記錄整理成與原始業務報告相同格式</p>
    <button class="btn-export btn-excel" onclick="exportExcel()">📥 下載 Excel 月報（.xlsx）</button>
    <button class="btn-export btn-csv" onclick="exportCSV()">📄 下載 CSV 原始記錄</button>
  </div>
  <div class="export-card">
    <h3>🔄 重新載入雲端資料</h3>
    <button class="btn-export" style="background:var(--lib)" onclick="loadFromCloud()">從 Google 試算表同步</button>
  </div>
</div>

<!-- Page: Setting -->
<div class="page" id="page-setting">
  <div class="export-card">
    <h3>⚙ 月份設定</h3>
    <div class="month-row">
      <input class="month-input" id="monthInput" placeholder="如：115.03" maxlength="8">
      <button class="btn-set" onclick="setMonth()">確定</button>
    </div>
    <p style="font-size:12px;color:var(--ink2)">目前月份：<strong id="curMonthDisplay">未設定</strong></p>
  </div>
  <div class="export-card" style="background:#fff8f6;border:1.5px solid #fde0d8">
    <h3 style="color:var(--accent)">⚠ 清除本月資料</h3>
    <p style="font-size:12px;color:var(--ink2);margin-bottom:10px">僅清除本機快取，雲端試算表資料不受影響</p>
    <button class="btn-export" style="background:var(--accent)" onclick="clearLocal()">清除本機快取</button>
  </div>
</div>

  { s:'其他', c:'other', id:'oth19', n:'支援-醫師簡碼表(人資室)', f:'不定期' },
  { s:'其他', c:'other', id:'oth20', n:'支援-醫師身體不適', f:'不定期' },
  { s:'其他', c:'other', id:'oth21', n:'醫師臨時交辦-病歷照片/簡報/檔案', f:'不定期' },
  { s:'其他', c:'other', id:'oth22', n:'醫師臨時交辦-簡報製作', f:'不定期' },
  { s:'主管交辦', c:'mgmt', id:'mgmt1', n:'每月業務報表', f:'每月' },
  { s:'主管交辦', c:'mgmt', id:'mgmt2', n:'新人報到', f:'不定期' },
  { s:'主管交辦', c:'mgmt', id:'mgmt3', n:'差勤維護', f:'每月' },
  { s:'主管交辦', c:'mgmt', id:'mgmt4', n:'醫教會/醫務會議教研簡報', f:'不定期' },
  { s:'主管交辦', c:'mgmt', id:'mgmt5', n:'醫療部週六值班', f:'每月' },
  { s:'活動', c:'event', id:'evt1', n:'參與院內師培課程', f:'不定期' },
  { s:'活動', c:'event', id:'evt2', n:'其他活動', f:'不定期' },
];

const SEC_ORDER = ['圖書館相關業務','IRB(人體試驗委員會)','牙醫PGY/國外實習生','其他','主管交辦','活動'];
const CAT_COLOR = { lib:'var(--lib)', irb:'var(--irb)', dental:'var(--dental)', other:'var(--other)', mgmt:'var(--mgmt)', event:'var(--event)' };
const CAT_BG = { lib:'rec-bg-lib', irb:'rec-bg-irb', dental:'rec-bg-dental', other:'rec-bg-other', mgmt:'rec-bg-mgmt', event:'rec-bg-event' };

let records = JSON.parse(localStorage.getItem('records_v2') || '[]');
let currentMonth = localStorage.getItem('currentMonth') || '';
let selectedTask = null;

function save() { localStorage.setItem('records_v2', JSON.stringify(records)); localStorage.setItem('currentMonth', currentMonth); }

function showToast(msg, dur=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function showLoading(msg='處理中…') { document.getElementById('loadingOverlay').style.display='flex'; document.getElementById('loadingMsg').textContent=msg; }
function hideLoading() { document.getElementById('loadingOverlay').style.display='none'; }

function showTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  if(tab === 'list') renderList();
  if(tab === 'export' || tab === 'setting') renderSetting();
}

function setMonth() {
  const v = document.getElementById('monthInput').value.trim();
  if(!v) { showToast('請輸入月份'); return; }
  currentMonth = v;
  save();
  document.getElementById('hdrMonth').textContent = currentMonth;
  document.getElementById('curMonthDisplay').textContent = currentMonth;
  showToast('✓ 月份設定為 ' + currentMonth);
}

function renderSetting() {
  document.getElementById('monthInput').value = currentMonth;
  document.getElementById('curMonthDisplay').textContent = currentMonth || '未設定';
}

function init() {
  if(currentMonth) {
    document.getElementById('hdrMonth').textContent = currentMonth;
    document.getElementById('curMonthDisplay').textContent = currentMonth;
  }
  renderTaskList();
  renderList();
  // Set today's date
  const today = new Date().toISOString().split('T')[0];
  document.querySelectorAll('input[type=date]').forEach(i => i.value = today);
}

// ── Task list ──
function renderTaskList() {
  const sections = {};
  TASKS.forEach(t => { if(!sections[t.s]) sections[t.s] = []; sections[t.s].push(t); });
  let html = '';
  SEC_ORDER.forEach(sec => {
    if(!sections[sec]) return;
    const cat = sections[sec][0].c;
    html += `<div class="sec-group sec-${cat}"><div class="sec-hdr">${sec}</div><div class="task-grid">`;
    sections[sec].forEach(t => {
      html += `<button class="task-btn" id="tbtn-${t.id}" onclick="selectTask('${t.id}')">
        <span class="task-name">${t.n}</span>
        <span class="task-freq">${t.f}</span>
      </button>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('taskList').innerHTML = html;
}

function selectTask(id) {
  document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tbtn-' + id)?.classList.add('active');
  selectedTask = TASKS.find(t => t.id === id);
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('inputForm').style.display = 'block';
  document.getElementById('inputForm').innerHTML = `
    <div class="input-card">
      <div class="input-task-name">📌 ${selectedTask.n}</div>
      <div class="input-row">
        <div class="field">
          <label>說明 / 數量</label>
          <textarea id="fDesc" placeholder="如：借書10本、查詢3篇"></textarea>
        </div>
        <div class="inline-row">
          <div class="field">
            <label>時數（小時）</label>
            <input type="number" id="fHours" min="0" step="0.5" placeholder="0.0" inputmode="decimal">
          </div>
          <div class="field">
            <label>日期</label>
            <input type="date" id="fDate" value="${today}">
          </div>
        </div>
        <button class="btn-add" onclick="addRecord()">➕ 新增記錄</button>
        <button class="btn-cancel" onclick="closeForm()">取消</button>
      </div>
    </div>`;
  document.getElementById('inputForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  setTimeout(() => document.getElementById('fHours')?.focus(), 200);
}

function closeForm() {
  document.getElementById('inputForm').style.display = 'none';
  document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
  selectedTask = null;
}

async function addRecord() {
  if(!selectedTask) return;
  if(!currentMonth) { showToast('⚠ 請先設定月份'); showTab('setting'); return; }
  const desc = document.getElementById('fDesc').value.trim();
  const hours = parseFloat(document.getElementById('fHours').value) || 0;
  const date = document.getElementById('fDate').value;
  if(!hours && !desc) { showToast('請填入時數或說明'); return; }

  const rec = {
    id: Date.now(),
    month: currentMonth,
    taskId: selectedTask.id,
    taskName: selectedTask.n,
    section: selectedTask.s,
    cat: selectedTask.c,
    desc, hours, date
  };

  // Optimistically add locally
  records.push(rec);
  save();
  showToast('✓ 已儲存');
  closeForm();
  
  // Sync to cloud
  try {
    await fetch(API, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'add', ...rec })
    });
  } catch(e) {
    // no-cors means we can't read response, but request was sent
  }
}

async function loadFromCloud() {
  showLoading('從 Google 試算表同步…');
  try {
    const res = await fetch(API + '?t=' + Date.now());
    const data = await res.json();
    if(Array.isArray(data)) {
      // Map spreadsheet rows back to record objects
      records = data.filter(r => r['月份']).map(r => ({
        id: r['id'] || Date.now() + Math.random(),
        month: String(r['月份'] || ''),
        taskId: r['taskId'] || '',
        taskName: r['業務項目'] || '',
        section: r['類別'] || '',
        cat: r['cat'] || getCatFromSection(r['類別']),
        desc: r['說明數量'] || '',
        hours: parseFloat(r['時數']) || 0,
        date: r['日期'] || ''
      }));
      save();
      showToast(`✓ 同步完成，共 ${records.length} 筆`);
      renderList();
    }
  } catch(e) {
    showToast('⚠ 同步失敗，請確認網路連線');
  }
  hideLoading();
}

function getCatFromSection(sec) {
  if(!sec) return 'other';
  if(sec.includes('圖書')) return 'lib';
  if(sec.includes('IRB')) return 'irb';
  if(sec.includes('牙')) return 'dental';
  if(sec.includes('主管')) return 'mgmt';
  if(sec.includes('活動')) return 'event';
  return 'other';
}

function deleteRecord(id) {
  if(!confirm('確定刪除？')) return;
  records = records.filter(r => r.id !== id);
  save();
  renderList();
  showToast('已刪除');
}

function clearLocal() {
  if(!confirm('確定清除本機快取？（雲端資料不受影響）')) return;
  records = [];
  save();
  renderList();
  showToast('已清除本機快取');
}

// ── Render list ──
function renderList() {
  const mr = records.filter(r => r.month === currentMonth);
  const stats = document.getElementById('statsArea');
  const list = document.getElementById('recordList');

  if(!mr.length) {
    stats.innerHTML = '';
    list.innerHTML = `<div class="empty"><div class="ico">📝</div><p>本月尚無記錄<br><small>點「記錄」分頁開始新增</small></p></div>`;
    return;
  }

  const total = mr.reduce((s,r) => s + r.hours, 0);
  const bySection = {};
  mr.forEach(r => { bySection[r.section] = (bySection[r.section] || 0) + r.hours; });

  stats.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="val">${total.toFixed(1)}</div><div class="lbl">總時數</div></div>
      <div class="stat-card"><div class="val">${mr.length}</div><div class="lbl">記錄筆數</div></div>
      <div class="stat-card"><div class="val">${Object.keys(bySection).length}</div><div class="lbl">業務類別</div></div>
    </div>
    <div class="section-stats">
      ${Object.entries(bySection).map(([s,h]) => {
        const cat = getCatFromSection(s);
        const short = s.replace('圖書館相關業務','圖書館').replace('IRB(人體試驗委員會)','IRB').replace('牙醫PGY/國外實習生','牙科');
        return `<div class="sec-pill" style="background:${CAT_COLOR[cat]}20;color:${CAT_COLOR[cat]}">
          <span>${short}</span><span class="hrs">${h.toFixed(1)}h</span>
        </div>`;
      }).join('')}
    </div>`;

  const grouped = {};
  mr.forEach(r => { if(!grouped[r.section]) grouped[r.section] = []; grouped[r.section].push(r); });

  let html = '';
  SEC_ORDER.forEach(sec => {
    if(!grouped[sec]) return;
    const recs = grouped[sec].sort((a,b) => (a.date||'').localeCompare(b.date||''));
    const cat = recs[0].cat;
    const secTotal = recs.reduce((s,r) => s + r.hours, 0);
    html += `<div class="rec-section">
      <div class="rec-sec-hdr ${CAT_BG[cat]}">
        <span>※ ${sec}</span>
        <span class="sub-total">小計 ${secTotal.toFixed(1)} 時</span>
      </div>
      <div class="rec-list">`;
    recs.forEach(r => {
      html += `<div class="rec-item">
        <div class="rec-info">
          <div class="rec-task">${r.taskName}</div>
          ${r.desc ? `<div class="rec-desc">${r.desc}</div>` : ''}
          <div class="rec-date">${r.date || ''}</div>
        </div>
        <div class="rec-hrs">${r.hours}h</div>
        <button class="rec-del" onclick="deleteRecord(${r.id})">×</button>
      </div>`;
    });
    html += `</div></div>`;
  });
  list.innerHTML = html;
}

// ── Export ──
function exportExcel() {
  if(!currentMonth) { showToast('請先設定月份'); return; }
  const mr = records.filter(r => r.month === currentMonth);
  const wb = XLSX.utils.book_new();
  const sections = [
    { title:'※圖書館相關業務', tasks: TASKS.filter(t=>t.c==='lib') },
    { title:'※IRB(人體試驗委員會)', tasks: TASKS.filter(t=>t.c==='irb') },
    { title:'※牙醫PGY/國外實習生', tasks: TASKS.filter(t=>t.c==='dental') },
    { title:'※其他', tasks: TASKS.filter(t=>t.c==='other') },
    { title:'※主管交辦', tasks: TASKS.filter(t=>t.c==='mgmt') },
    { title:'※活動', tasks: TASKS.filter(t=>t.c==='event') },
  ];
  const wsData = [['業務項目','','頻次','數量','預估時數']];
  let grandTotal = 0;
  sections.forEach(sec => {
    wsData.push([sec.title,'','','','']);
    let secTotal = 0, i = 1;
    sec.tasks.forEach(t => {
      const recs = mr.filter(r => r.taskId === t.id);
      const h = recs.reduce((s,r) => s + r.hours, 0);
      const desc = recs.map(r => r.desc).filter(Boolean).join('、');
      wsData.push([i, t.n, t.f, desc, h]);
      secTotal += h; i++;
    });
    wsData.push(['','','','小計', secTotal]);
    grandTotal += secTotal;
    wsData.push(['','','','','']);
  });
  wsData.push(['','','','總計時數', grandTotal]);
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:6},{wch:28},{wch:8},{wch:32},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, currentMonth);
  const ws2Data = [['月份','類別','業務項目','說明/數量','時數','日期']];
  mr.forEach(r => ws2Data.push([r.month, r.section, r.taskName, r.desc, r.hours, r.date]));
  const ws2 = XLSX.utils.aoa_to_sheet(ws2Data);
  ws2['!cols'] = [{wch:8},{wch:18},{wch:28},{wch:40},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, '原始記錄');
  XLSX.writeFile(wb, `業務報告_蕙琦_${currentMonth}.xlsx`);
}

function exportCSV() {
  if(!currentMonth) { showToast('請先設定月份'); return; }
  const mr = records.filter(r => r.month === currentMonth);
  if(!mr.length) { showToast('本月尚無記錄'); return; }
  let csv = '月份,類別,業務項目,說明/數量,時數,日期\n';
  mr.forEach(r => { csv += `"${r.month}","${r.section}","${r.taskName}","${r.desc}","${r.hours}","${r.date}"\n`; });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `業務記錄_${currentMonth}.csv`; a.click();
}

init();
</script>
