<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>業務記錄 · 蕙琦</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --ink: #1a1a2e;
  --ink2: #5a5a7a;
  --accent: #c84b31;
  --border: #e0ddd6;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --r: 12px;
  --lib: #2d6a9f; --irb: #7b3fa0; --dental: #c84b31;
  --other: #2e7d5e; --mgmt: #b5620a; --event: #c47a00;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; }

.hdr {
  background: var(--ink); color: white;
  padding: 14px 18px 12px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
}
.hdr-title { font-size: 16px; font-weight: 900; letter-spacing: 1px; }
.hdr-sub { font-size: 11px; opacity: 0.5; margin-top: 1px; }
.hdr-month {
  background: var(--accent); color: white; border: none;
  border-radius: 8px; padding: 6px 14px; font-size: 13px;
  font-weight: 700; font-family: inherit; cursor: pointer;
}

.tabs {
  display: flex; background: var(--card);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 57px; z-index: 99;
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: none; padding: 10px 16px;
  font-size: 13px; font-weight: 700; color: var(--ink2);
  cursor: pointer; border-bottom: 3px solid transparent;
  white-space: nowrap; transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.page { display: none; padding: 14px; }
.page.active { display: block; }

/* Cards */
.card { background: var(--card); border-radius: var(--r); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-title { font-size: 14px; font-weight: 900; margin-bottom: 12px; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
.stat-card { background: var(--card); border-radius: var(--r); padding: 12px 8px; text-align: center; box-shadow: var(--shadow); }
.stat-card .val { font-size: 22px; font-weight: 900; color: var(--accent); }
.stat-card .lbl { font-size: 11px; color: var(--ink2); margin-top: 2px; }
.sec-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.sec-pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }

/* Section groups */
.sec-group { margin-bottom: 14px; }
.sec-hdr {
  font-size: 11px; font-weight: 900; letter-spacing: 1px;
  color: var(--ink2); padding: 5px 0 5px 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-left: 3px solid var(--border);
}
.sec-lib .sec-hdr { border-left-color: var(--lib); color: var(--lib); }
.sec-irb .sec-hdr { border-left-color: var(--irb); color: var(--irb); }
.sec-dental .sec-hdr { border-left-color: var(--dental); color: var(--dental); }
.sec-other .sec-hdr { border-left-color: var(--other); color: var(--other); }
.sec-mgmt .sec-hdr { border-left-color: var(--mgmt); color: var(--mgmt); }
.sec-event .sec-hdr { border-left-color: var(--event); color: var(--event); }

.task-list { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.task-row {
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 9px 12px;
  transition: all 0.15s;
}
.task-row.active { border-color: var(--accent); background: #fff5f3; }
.task-btn-area { flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.task-btn-area:active { opacity: 0.7; }
.task-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.task-freq { font-size: 11px; color: var(--ink2); }
.task-del { background: none; border: none; cursor: pointer; color: #ddd; font-size: 16px; padding: 2px 4px; flex-shrink: 0; }
.task-del:active { color: var(--accent); }

.add-task-row { display: flex; gap: 6px; margin-top: 8px; }
.add-task-input {
  flex: 1; border: 1.5px dashed var(--border); border-radius: 8px;
  padding: 8px 10px; font-size: 13px; font-family: inherit;
  background: var(--bg); color: var(--ink);
}
.add-task-input:focus { outline: none; border-color: var(--accent); background: white; }
.freq-select {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 6px; font-size: 12px; font-family: inherit;
  background: white; color: var(--ink); width: 72px;
}
.btn-add-task {
  background: var(--ink); color: white; border: none;
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap;
}
.btn-add-task:active { opacity: 0.8; }

/* Input form */
.input-card {
  background: #fff8f6; border: 2px solid var(--accent);
  border-radius: var(--r); padding: 14px; margin-bottom: 14px;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.input-task-name { font-size: 14px; font-weight: 900; color: var(--accent); margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.field label { font-size: 11px; font-weight: 700; color: var(--ink2); }
.field input, .field textarea {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 14px; font-family: inherit; background: white;
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
.field textarea { resize: none; height: 60px; }
.inline-row { display: flex; gap: 8px; }
.inline-row .field { flex: 1; }
.btn-submit {
  width: 100%; background: var(--accent); color: white; border: none;
  border-radius: 10px; padding: 12px; font-size: 15px;
  font-weight: 900; font-family: inherit; cursor: pointer; letter-spacing: 0.5px;
}
.btn-submit:active { background: #a83020; }
.btn-cancel {
  width: 100%; background: none; color: var(--ink2);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px; font-size: 13px; font-family: inherit; cursor: pointer; margin-top: 6px;
}

/* Record list */
.rec-sec { margin-bottom: 14px; }
.rec-sec-hdr {
  color: white; padding: 7px 12px; border-radius: 8px 8px 0 0;
  display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 900;
}
.rec-sec-hdr .sub { font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
.bg-lib{background:var(--lib)} .bg-irb{background:var(--irb)} .bg-dental{background:var(--dental)}
.bg-other{background:var(--other)} .bg-mgmt{background:var(--mgmt)} .bg-event{background:var(--event)}
.rec-list { background: var(--card); border-radius: 0 0 8px 8px; overflow: hidden; }
.rec-item { display: flex; align-items: flex-start; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
.rec-item:last-child { border-bottom: none; }
.rec-info { flex: 1; min-width: 0; }
.rec-task { font-size: 13px; font-weight: 700; }
.rec-desc { font-size: 12px; color: var(--ink2); margin-top: 2px; word-break: break-all; }
.rec-date { font-size: 11px; color: #aaa; margin-top: 2px; }
.rec-hrs { background: var(--ink); color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 900; white-space: nowrap; align-self: flex-start; }
.rec-del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; padding: 0 0 0 4px; align-self: flex-start; }
.rec-del:active { color: var(--accent); }

/* Settings */
.month-row { display: flex; gap: 8px; margin-bottom: 10px; }
.month-input { flex: 1; border: 2px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; background: var(--card); }
.month-input:focus { outline: none; border-color: var(--accent); }
.btn-set { background: var(--ink); color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }

/* Export */
.btn-exp {
  display: block; width: 100%; padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; margin-bottom: 8px;
}
.btn-exp:active { opacity: 0.8; }
.btn-excel { background: #1d6f42; color: white; }
.btn-sync { background: var(--lib); color: white; }
.btn-danger { background: var(--accent); color: white; }

/* Empty */
.empty { text-align: center; padding: 48px 20px; color: #bbb; }
.empty .ico { font-size: 40px; margin-bottom: 10px; }

/* Toast / Loading */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: white; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 700; transition: transform 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: none; align-items: center; justify-content: center; z-index: 998;
}
.overlay.on { display: flex; }
.loading-box { background: white; border-radius: var(--r); padding: 24px 32px; text-align: center; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: none; align-items: flex-end; justify-content: center; z-index: 200;
}
.modal-overlay.on { display: flex; }
.modal {
  background: var(--card); border-radius: 16px 16px 0 0;
  padding: 20px; width: 100%; max-width: 500px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 15px; font-weight: 900; margin-bottom: 14px; }
.modal .field input { width: 100%; }
.modal .field select { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; }
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.modal-btns button { flex: 1; padding: 11px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-confirm { background: var(--accent); color: white; }
.btn-close-modal { background: var(--bg); color: var(--ink2); }

/* Edit record modal */
.edit-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: none; align-items: flex-end; justify-content: center; z-index: 300;
}
.edit-modal-overlay.on { display: flex; }
.edit-modal {
  background: var(--card); border-radius: 16px 16px 0 0;
  padding: 20px; width: 100%; max-width: 500px;
  animation: slideUp 0.25s ease;
}
.edit-modal h3 { font-size: 14px; font-weight: 900; color: var(--accent); margin-bottom: 14px; }
.edit-modal .field input, .edit-modal .field textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 14px; font-family: inherit; background: white;
}
.edit-modal .field input:focus, .edit-modal .field textarea:focus { outline: none; border-color: var(--accent); }
.edit-modal .field textarea { resize: none; height: 60px; }
.rec-hrs { cursor: pointer; transition: transform 0.1s; }
.rec-hrs:active { transform: scale(0.92); }

/* Summary styles */
.sum-sec { margin-bottom: 16px; }
.sum-sec-hdr {
  color: white; padding: 7px 12px; border-radius: 8px 8px 0 0;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 900;
}
.sum-sec-hdr .sub { font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
.sum-table { width: 100%; background: var(--card); border-radius: 0 0 8px 8px; overflow: hidden; }
.sum-row {
  border-bottom: 1px solid var(--border); padding: 10px 12px;
}
.sum-row:last-child { border-bottom: none; }
.sum-row-hdr { display: flex; align-items: center; justify-content: space-between; }
.sum-task-name { font-size: 13px; font-weight: 700; color: var(--ink); flex: 1; }
.sum-hrs { background: var(--ink); color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 900; white-space: nowrap; }
.sum-notes { margin-top: 6px; padding-left: 4px; }
.sum-note-item {
  font-size: 12px; color: var(--ink2); padding: 2px 0 2px 12px;
  border-left: 2px solid var(--border); margin-bottom: 3px;
  display: flex; gap: 6px; align-items: flex-start;
}
.sum-note-date { font-size: 11px; color: #aaa; white-space: nowrap; flex-shrink: 0; }
</style>
</head>
<body>

<div class="overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loadingMsg">處理中…</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="addTaskModal">
  <div class="modal">
    <h3 id="modalTitle">新增業務項目</h3>
    <div class="field">
      <label>項目名稱</label>
      <input type="text" id="newTaskName" placeholder="輸入業務項目名稱">
    </div>
    <div class="field">
      <label>頻次</label>
      <select id="newTaskFreq">
        <option>不定期</option><option>每日</option><option>每周</option>
        <option>每月</option><option>每季</option><option>每年</option>
        <option>Q4M</option><option>每2年</option><option>雙周</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-close-modal" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmAddTask()">新增</button>
    </div>
  </div>
</div>

<!-- Edit Record Modal -->
<div class="edit-modal-overlay" id="editRecModal">
  <div class="edit-modal">
    <h3 id="editRecTitle">✏️ 編輯記錄</h3>
    <div class="field"><label>說明 / 數量</label>
      <textarea id="editDesc"></textarea></div>
    <div style="display:flex;gap:8px">
      <div class="field" style="flex:1"><label>時數（小時）</label>
        <input type="number" id="editHours" min="0" step="0.5" inputmode="decimal"></div>
      <div class="field" style="flex:1"><label>日期</label>
        <input type="date" id="editDate"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-close-modal" onclick="closeEditModal()">取消</button>
      <button class="btn-confirm" onclick="saveEditRecord()">✓ 儲存</button>
    </div>
  </div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-title">📋 業務記錄</div>
    <div class="hdr-sub">蕙琦 · 雲端同步版</div>
  </div>
  <button class="hdr-month" onclick="showTab('setting')">
    <span id="hdrMonth">⚙ 設定月份</span>
  </button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('record')" data-tab="record">＋ 記錄</div>
  <div class="tab" onclick="showTab('list')" data-tab="list">📋 本月</div>
  <div class="tab" onclick="showTab('summary')" data-tab="summary">📈 統計</div>
  <div class="tab" onclick="showTab('manage')" data-tab="manage">✏️ 管理項目</div>
  <div class="tab" onclick="showTab('export')" data-tab="export">📊 匯出</div>
  <div class="tab" onclick="showTab('setting')" data-tab="setting">⚙ 設定</div>
</div>

<div class="page active" id="page-record">
  <div id="inputForm" style="display:none"></div>
  <div id="taskList"></div>
</div>

<div class="page" id="page-list">
  <div id="statsArea"></div>
  <div id="recordList"></div>
</div>

<div class="page" id="page-summary">
  <div id="summaryContent"></div>
</div>

<div class="page" id="page-manage">
  <div id="manageList"></div>
</div>

<div class="page" id="page-export">
  <div class="card">
    <div class="card-title">📊 產出月報</div>
    <p style="font-size:12px;color:var(--ink2);margin-bottom:12px">整理成與原始業務報告相同格式</p>
    <button class="btn-exp btn-excel" onclick="exportExcel()">📥 下載 Excel 月報</button>
  </div>
  <div class="card">
    <div class="card-title">🔄 雲端同步</div>
    <button class="btn-exp btn-sync" onclick="loadFromCloud()">從 Google 試算表同步資料</button>
  </div>
</div>

<div class="page" id="page-setting">
  <div class="card">
    <div class="card-title">⚙ 月份設定</div>
    <div class="month-row">
      <input class="month-input" id="monthInput" placeholder="如：115.03" maxlength="8">
      <button class="btn-set" onclick="setMonth()">確定</button>
    </div>
    <p style="font-size:12px;color:var(--ink2)">目前月份：<strong id="curMonthDisplay">未設定</strong></p>
  </div>
  <div class="card" style="background:#fff8f6;border:1.5px solid #fde0d8">
    <div class="card-title" style="color:var(--accent)">⚠ 清除本機快取</div>
    <p style="font-size:12px;color:var(--ink2);margin-bottom:10px">僅清除本機，雲端資料不受影響</p>
    <button class="btn-exp btn-danger" onclick="clearLocal()">清除</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxTZShbz0HmX__CPsqOlJRpr9C159zGXLP60xz4-ws0QDPmqXNHzsLom1W6NTmkqs2DUA/exec';

const SEC_ORDER = ['圖書館相關業務','IRB(人體試驗委員會)','牙醫PGY/國外實習生','其他','主管交辦','活動'];
const CAT_MAP = { lib:'圖書館相關業務', irb:'IRB(人體試驗委員會)', dental:'牙醫PGY/國外實習生', other:'其他', mgmt:'主管交辦', event:'活動' };
const SEC_CAT = { '圖書館相關業務':'lib','IRB(人體試驗委員會)':'irb','牙醫PGY/國外實習生':'dental','其他':'other','主管交辦':'mgmt','活動':'event' };
const CAT_COLOR = { lib:'var(--lib)',irb:'var(--irb)',dental:'var(--dental)',other:'var(--other)',mgmt:'var(--mgmt)',event:'var(--event)' };
const BG_CLASS = { lib:'bg-lib',irb:'bg-irb',dental:'bg-dental',other:'bg-other',mgmt:'bg-mgmt',event:'bg-event' };

const DEFAULT_TASKS = [
  {s:'圖書館相關業務',id:'lib1',n:'流通作業(借、還、預約)',f:'不定期'},
  {s:'圖書館相關業務',id:'lib2',n:'期刊代查詢(含館際合作)',f:'不定期'},
  {s:'圖書館相關業務',id:'lib3',n:'讀者資料維護(新增、停權)',f:'不定期'},
  {s:'圖書館相關業務',id:'lib4',n:'門禁系統管理(新增、刪除)',f:'不定期'},
  {s:'圖書館相關業務',id:'lib5',n:'報紙管理',f:'每日'},
  {s:'圖書館相關業務',id:'lib6',n:'環境維護與管理(含空間規劃)',f:'每日'},
  {s:'圖書館相關業務',id:'lib7',n:'新書公告',f:'每月'},
  {s:'圖書館相關業務',id:'lib8',n:'各項資源介購資料蒐集及需求調查',f:'不定期'},
  {s:'圖書館相關業務',id:'lib9',n:'各項資源介購代理商聯繫(含報價、比價等)',f:'不定期'},
  {s:'圖書館相關業務',id:'lib10',n:'經費核銷',f:'不定期'},
  {s:'圖書館相關業務',id:'lib11',n:'資源編目、上架、典藏、裝訂處理',f:'不定期'},
  {s:'圖書館相關業務',id:'lib12',n:'圖書館網頁維護',f:'不定期'},
  {s:'圖書館相關業務',id:'lib13',n:'圖書館相關SOP制、修訂',f:'不定期'},
  {s:'圖書館相關業務',id:'lib14',n:'圖委會',f:'Q4M'},
  {s:'圖書館相關業務',id:'lib15',n:'館藏盤點',f:'不定期'},
  {s:'圖書館相關業務',id:'lib16',n:'讀者服務',f:'不定期'},

// State
let records = JSON.parse(localStorage.getItem('records_v3') || '[]');
let tasks = JSON.parse(localStorage.getItem('tasks_v3') || 'null') || JSON.parse(JSON.stringify(DEFAULT_TASKS));
let currentMonth = localStorage.getItem('currentMonth') || '';
let selectedTask = null;
let modalSection = null;

function save() {
  localStorage.setItem('records_v3', JSON.stringify(records));
  localStorage.setItem('tasks_v3', JSON.stringify(tasks));
  localStorage.setItem('currentMonth', currentMonth);
}

function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function showLoading(msg='處理中…') { document.getElementById('loadingOverlay').classList.add('on'); document.getElementById('loadingMsg').textContent=msg; }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('on'); }

function showTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  if(tab==='list') renderList();
  if(tab==='summary') renderSummary();
  if(tab==='manage') renderManage();
  if(tab==='setting') renderSetting();
}

function init() {
  if(currentMonth) {
    document.getElementById('hdrMonth').textContent = currentMonth;
    document.getElementById('curMonthDisplay').textContent = currentMonth;
  }
  renderTaskList();
}

function setMonth() {
  const v = document.getElementById('monthInput').value.trim();
  if(!v) { showToast('請輸入月份'); return; }
  currentMonth = v;
  save();
  document.getElementById('hdrMonth').textContent = currentMonth;
  document.getElementById('curMonthDisplay').textContent = currentMonth;
  showToast('✓ 月份設定為 ' + currentMonth);
}

function renderSetting() {
  document.getElementById('monthInput').value = currentMonth;
  document.getElementById('curMonthDisplay').textContent = currentMonth || '未設定';
}

// ── Task List (Record tab) ──
function renderTaskList() {
  const grouped = {};
  tasks.forEach(t => { if(!grouped[t.s]) grouped[t.s]=[]; grouped[t.s].push(t); });
  let html = '';
  SEC_ORDER.forEach(sec => {
    if(!grouped[sec] || !grouped[sec].length) return;
    const cat = SEC_CAT[sec];
    html += `<div class="sec-group sec-${cat}"><div class="sec-hdr">${sec}</div><div class="task-list">`;
    grouped[sec].forEach(t => {
      html += `<div class="task-row" id="trow-${t.id}">
        <div class="task-btn-area" onclick="selectTask('${t.id}')">
          <span class="task-name">${t.n}</span>
          <span class="task-freq">${t.f}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('taskList').innerHTML = html;
}

function selectTask(id) {
  document.querySelectorAll('.task-row').forEach(r => r.classList.remove('active'));
  document.getElementById('trow-' + id)?.classList.add('active');
  selectedTask = tasks.find(t => t.id === id);
  const today = new Date().toISOString().split('T')[0];
  const form = document.getElementById('inputForm');
  form.style.display = 'block';
  form.innerHTML = `<div class="input-card">
    <div class="input-task-name">📌 ${selectedTask.n}</div>
    <div class="field"><label>說明 / 數量</label>
      <textarea id="fDesc" placeholder="如：借書10本、查詢3篇"></textarea></div>
    <div class="inline-row">
      <div class="field"><label>時數（小時）</label>
        <input type="number" id="fHours" min="0" step="0.5" placeholder="0.0" inputmode="decimal"></div>
      <div class="field"><label>日期</label>
        <input type="date" id="fDate" value="${today}"></div>
    </div>
    <button class="btn-submit" onclick="addRecord()">➕ 新增記錄</button>
    <button class="btn-cancel" onclick="closeForm()">取消</button>
  </div>`;
  form.scrollIntoView({ behavior:'smooth', block:'nearest' });
  setTimeout(() => document.getElementById('fHours')?.focus(), 200);
}

function closeForm() {
  document.getElementById('inputForm').style.display = 'none';
  document.querySelectorAll('.task-row').forEach(r => r.classList.remove('active'));
  selectedTask = null;
}

async function addRecord() {
  if(!selectedTask) return;
  if(!currentMonth) { showToast('⚠ 請先設定月份'); showTab('setting'); return; }
  const desc = document.getElementById('fDesc').value.trim();
  const hours = parseFloat(document.getElementById('fHours').value) || 0;
  const date = document.getElementById('fDate').value;
  if(!hours && !desc) { showToast('請填入時數或說明'); return; }
  const rec = {
    id: Date.now(), month: currentMonth,
    taskId: selectedTask.id, taskName: selectedTask.n,
    section: selectedTask.s, cat: SEC_CAT[selectedTask.s],
    desc, hours, date
  };
  records.push(rec); save();
  showToast('✓ 已儲存');
  closeForm();
  try {
    await fetch(API, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'add', ...rec }) });
  } catch(e) {}
}

async function deleteRecord(id) {
  if(!confirm('確定刪除？')) return;
  records = records.filter(r => r.id !== id);
  save(); renderList(); showToast('已刪除');
  try {
    await fetch(API, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'delete', id }) });
  } catch(e) {}
}

function addTask(cat, sec) {
  const nameEl = document.getElementById('newName-' + cat);
  const freqEl = document.getElementById('newFreq-' + cat);
  const name = nameEl.value.trim();
  if(!name) { showToast('請輸入項目名稱'); nameEl.focus(); return; }
  const newTask = {
    s: sec,
    id: cat + '_' + Date.now(),
    n: name,
    f: freqEl.value
  };
  tasks.push(newTask);
  save();
  nameEl.value = '';
  renderManage();
  renderTaskList();
  showToast('✓ 已新增：' + name);
  syncTasksToCloud();
}

function deleteTask(id) {
  const t = tasks.find(t => t.id === id);
  if(!t) return;
  if(!confirm(`確定刪除「${t.n}」？\n（已記錄的歷史資料不受影響）`)) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderManage();
  renderTaskList();
  showToast('已刪除');
  syncTasksToCloud();
}

async function syncTasksToCloud() {
  try {
    await fetch(API, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'saveTasks', tasks }) });
  } catch(e) {}
}

// ── Record List ──
function renderList() {
  const mr = records.filter(r => r.month === currentMonth);
  const stats = document.getElementById('statsArea');
  const list = document.getElementById('recordList');
  if(!mr.length) {
    stats.innerHTML='';
    list.innerHTML=`<div class="empty"><div class="ico">📝</div><p>本月尚無記錄<br><small>點「＋ 記錄」分頁開始新增</small></p></div>`;
    return;
  }
  const total = mr.reduce((s,r)=>s+r.hours,0);
  const bySection = {};
  mr.forEach(r=>{ bySection[r.section]=(bySection[r.section]||0)+r.hours; });
  stats.innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="val">${total.toFixed(1)}</div><div class="lbl">總時數</div></div>
      <div class="stat-card"><div class="val">${mr.length}</div><div class="lbl">記錄筆數</div></div>
      <div class="stat-card"><div class="val">${Object.keys(bySection).length}</div><div class="lbl">業務類別</div></div>
    </div>
    <div class="sec-pills">
      ${Object.entries(bySection).map(([s,h])=>{
        const cat=SEC_CAT[s]||'other';
        const short=s.replace('圖書館相關業務','圖書館').replace('IRB(人體試驗委員會)','IRB').replace('牙醫PGY/國外實習生','牙科');
        return `<div class="sec-pill" style="background:${CAT_COLOR[cat]}20;color:${CAT_COLOR[cat]}">${short} <strong>${h.toFixed(1)}h</strong></div>`;
      }).join('')}
    </div>`;
  const grouped={};
  mr.forEach(r=>{ if(!grouped[r.section]) grouped[r.section]=[]; grouped[r.section].push(r); });
  let html='';
  SEC_ORDER.forEach(sec=>{
    if(!grouped[sec]) return;
    const recs=grouped[sec].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const cat=SEC_CAT[sec]||'other';
    const secTotal=recs.reduce((s,r)=>s+r.hours,0);
    html+=`<div class="rec-sec">
      <div class="rec-sec-hdr ${BG_CLASS[cat]}">
        <span>※ ${sec}</span><span class="sub">小計 ${secTotal.toFixed(1)} 時</span>
      </div><div class="rec-list">`;
    recs.forEach(r=>{
      html+=`<div class="rec-item">
        <div class="rec-info">
          <div class="rec-task">${r.taskName}</div>
          ${r.desc?`<div class="rec-desc">${r.desc}</div>`:''}
          <div class="rec-date">${formatDate(r.date)}</div>
        </div>
        <div class="rec-hrs" onclick="openEditModal(${r.id})" title="點擊編輯">${r.hours}h ✏️</div>
        <button class="rec-del" onclick="deleteRecord(${r.id})">×</button>
      </div>`;
    });
    html+=`</div></div>`;
  });
  list.innerHTML=html;
}

// ── Summary ──
function renderSummary() {
  const mr = records.filter(r => r.month === currentMonth);
  const container = document.getElementById('summaryContent');
  if(!mr.length) {
    container.innerHTML = `<div class="empty"><div class="ico">📈</div><p>本月尚無記錄</p></div>`;
    return;
  }

  const total = mr.reduce((s,r) => s+r.hours, 0);

  // Group by section → task
  const bySec = {};
  SEC_ORDER.forEach(sec => { bySec[sec] = {}; });
  mr.forEach(r => {
    const sec = r.section || '其他';
    if(!bySec[sec]) bySec[sec] = {};
    if(!bySec[sec][r.taskName]) bySec[sec][r.taskName] = { hours:0, notes:[] };
    bySec[sec][r.taskName].hours += r.hours;
    if(r.desc || r.date) {
      bySec[sec][r.taskName].notes.push({ desc: r.desc, date: r.date });
    }
  });

  let html = `<div class="stats-row" style="margin-bottom:14px">
    <div class="stat-card"><div class="val">${total.toFixed(1)}</div><div class="lbl">總時數</div></div>
    <div class="stat-card"><div class="val">${mr.length}</div><div class="lbl">記錄筆數</div></div>
    <div class="stat-card"><div class="val">${Object.keys(bySec).filter(s=>Object.keys(bySec[s]).length>0).length}</div><div class="lbl">業務類別</div></div>
  </div>`;

  SEC_ORDER.forEach(sec => {
    const tasks = bySec[sec];
    if(!tasks || !Object.keys(tasks).length) return;
    const cat = SEC_CAT[sec] || 'other';
    const secTotal = Object.values(tasks).reduce((s,t) => s+t.hours, 0);

    html += `<div class="sum-sec">
      <div class="sum-sec-hdr ${BG_CLASS[cat]}">
        <span>※ ${sec}</span>
        <span class="sub">小計 ${secTotal.toFixed(1)} 時</span>
      </div>
      <div class="sum-table">`;

    Object.entries(tasks).forEach(([taskName, data]) => {
      const sortedNotes = data.notes.slice().sort((a,b) => (a.date||'').localeCompare(b.date||''));
      html += `<div class="sum-row">
        <div class="sum-row-hdr">
          <span class="sum-task-name">${taskName}</span>
          <span class="sum-hrs">${data.hours.toFixed(1)}h</span>
        </div>`;
      if(sortedNotes.length) {
        html += `<div class="sum-notes">`;
        sortedNotes.forEach(n => {
          if(n.desc || n.date) {
            html += `<div class="sum-note-item">
              <span class="sum-note-date">${n.date||''}</span>
              <span>${n.desc||''}</span>
            </div>`;
          }
        });
        html += `</div>`;
      }
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}
function formatDate(d) {
  if(!d) return '';
  // Handle ISO format like 2026-03-01T16:00:00.000Z
  if(typeof d === 'string' && d.includes('T')) return d.split('T')[0];
  // Handle Excel date numbers
  if(typeof d === 'number') {
    const date = new Date(Math.round((d - 25569) * 86400 * 1000));
    return date.toISOString().split('T')[0];
  }
  return String(d).split('T')[0];
}

async function loadFromCloud() {
  showLoading('從 Google 試算表同步…');
  try {
    const res = await fetch(API + '?t=' + Date.now());
    const data = await res.json();
    if(Array.isArray(data)) {
      const recData = data.filter(r => r['月份'] && r['type'] !== 'task');

      // Convert cloud rows → record objects, skip rows without id
      const cloudRecords = [];
      const seenIds = new Set();
      recData.forEach(r => {
        const idStr = String(r['id'] || '').trim();
        if(!idStr || idStr === 'undefined') return; // skip rows without id
        if(seenIds.has(idStr)) return;              // skip duplicates
        seenIds.add(idStr);
        cloudRecords.push({
          id: Number(idStr) || idStr,
          month: String(r['月份'] || ''),
          taskId: r['taskId'] || '',
          taskName: r['業務項目'] || '',
          section: r['類別'] || '',
          cat: SEC_CAT[r['類別']] || 'other',
          desc: r['說明數量'] || '',
          hours: parseFloat(r['時數']) || 0,
          date: formatDate(r['日期'])
        });
      });

      records = cloudRecords;

      const taskData = data.filter(r => r['type'] === 'task');
      if(taskData.length > 0) {
        tasks = taskData.map(r => ({ s: r['section'], id: r['id'], n: r['name'], f: r['freq'] }));
      }
      save();
      showToast(`✓ 同步完成，共 ${records.length} 筆`);
      renderList(); renderTaskList();
    }
  } catch(e) { showToast('⚠ 同步失敗，請確認網路連線'); }
  hideLoading();
}

  document.getElementById('editDate').value = r.date || '';
  document.getElementById('editRecModal').classList.add('on');
  setTimeout(() => document.getElementById('editHours').select(), 100);
}

function closeEditModal() {
  document.getElementById('editRecModal').classList.remove('on');
  editingRecordId = null;
}

async function saveEditRecord() {
  const r = records.find(r => r.id === editingRecordId);
  if(!r) return;
  r.desc = document.getElementById('editDesc').value.trim();
  r.hours = parseFloat(document.getElementById('editHours').value) || 0;
  r.date = document.getElementById('editDate').value;
  save();
  closeEditModal();
  renderList();
  showToast('✓ 已更新');
  try {
    await fetch(API, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'update', ...r }) });
  } catch(e) {}
}

function clearLocal() {
  if(!confirm('確定清除本機快取？')) return;
  records=[]; save(); renderList(); showToast('已清除本機快取');
}

// ── Export ──
function exportExcel() {
  if(!currentMonth) { showToast('請先設定月份'); return; }
  const mr = records.filter(r=>r.month===currentMonth);
  const wb = XLSX.utils.book_new();
  const secs = [
    {title:'※圖書館相關業務', cat:'lib'},
    {title:'※IRB(人體試驗委員會)', cat:'irb'},
    {title:'※牙醫PGY/國外實習生', cat:'dental'},
    {title:'※其他', cat:'other'},
    {title:'※主管交辦', cat:'mgmt'},
    {title:'※活動', cat:'event'},
  ];
  const wsData=[['業務項目','','頻次','數量','預估時數']];
  let grand=0;
  secs.forEach(sec=>{
    const secName = CAT_MAP[sec.cat];
    const secTasks = tasks.filter(t=>t.s===secName);
    wsData.push([sec.title,'','','','']);
    let tot=0, i=1;
    secTasks.forEach(t=>{
      const recs=mr.filter(r=>r.taskId===t.id);
      const h=recs.reduce((s,r)=>s+r.hours,0);
      const desc=recs.map(r=>r.desc).filter(Boolean).join('、');
      wsData.push([i,t.n,t.f,desc,h]); tot+=h; i++;
    });
    wsData.push(['','','','小計',tot]); grand+=tot;
    wsData.push(['','','','','']);
  });
  wsData.push(['','','','總計時數',grand]);
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:6},{wch:28},{wch:8},{wch:32},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,currentMonth);
  const ws2Data=[['月份','類別','業務項目','說明/數量','時數','日期']];
  mr.forEach(r=>ws2Data.push([r.month,r.section,r.taskName,r.desc,r.hours,r.date]));
  const ws2=XLSX.utils.aoa_to_sheet(ws2Data);
  ws2['!cols']=[{wch:8},{wch:18},{wch:28},{wch:40},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'原始記錄');
  XLSX.writeFile(wb,`業務報告_蕙琦_${currentMonth}.xlsx`);
}

init();
</script>
